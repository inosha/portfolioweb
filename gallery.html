<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Gallery | Alex Carter</title>
    <meta name="description" content="Shop floor gallery of Alex Carter, CNC Machinist Student.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Override for continuous flow */
        .scroll-section {
            min-height: auto;
            padding: 2rem 20px;
        }
        #hero {
            min-height: 50vh;
            padding-top: 15vh;
        }
        main#content {
            padding-bottom: 20vh;
        }
        /* Make gallery cards very wide to fit the grid nicely */
        .glass-card {
            max-width: 1000px;
        }
    </style>
</head>
<body>
    <!-- Reusing the loader from main portfolio -->
    <div id="loader">
        <div class="loader-content">
            <h2>Loading Gallery</h2>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p id="progress-text">0%</p>
        </div>
    </div>

    <div class="animation-container">
        <canvas id="hero-lightpass"></canvas>
    </div>

    <div class="parallax-bg" id="stars"></div>

    <main id="content">
        <!-- Header Section -->
        <section class="scroll-section" id="hero">
            <div class="glass-card fade-text">
                <h1>Daily Work Gallery</h1>
                <p class="subtitle">Alex Carter</p>
                <p>A collection of my day-to-day shop floor work, machining projects, and videos.</p>
                <div class="action-buttons">
                    <a href="cv.html" class="cta secondary">Back to CV</a>
                    <a href="index.html" class="cta">Main Portfolio</a>
                </div>
            </div>
        </section>

        <!-- Media Gallery Section -->
        <section class="scroll-section" id="gallery-content">
            <div class="glass-card fade-text">
                <h2>Media & Projects</h2>
                <div class="gallery-grid">
                    
                    <!-- YouTube Video -->
                    <div class="media-card">
                        <iframe src="https://www.youtube.com/embed/Es5JYd6LEL4?rel=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>

                    <!-- Photo 1 -->
                    <div class="media-card">
                        <img src="gallery/IMG_20260116_083216.jpg" alt="Shop floor work">
                    </div>

                    <!-- Photo 2 -->
                    <div class="media-card">
                        <img src="gallery/Screenshot 2026-04-25 at 20.18.45.png" alt="Shop floor screenshot">
                    </div>

                </div>
            </div>
        </section>
    </main>

    <div class="parallax-fg" id="dust"></div>

    <!-- Reusing the cv-script.js for the continuous background scrolling -->
    <script src="cv-script.js"></script>
</body>
</html>
